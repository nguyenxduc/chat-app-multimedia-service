services:
  minio:
    image: minio/minio:latest
    container_name: chatapp-minio
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  multimedia-service:
    build:
      context: .
      dockerfile: services/multimedia-service/Dockerfile
    container_name: chatapp-multimedia-service
    ports:
      - "${MULTIMEDIA_SERVICE_PORT:-4004}:4004"
      - "9467:9464"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      MULTIMEDIA_SERVICE_PORT: ${MULTIMEDIA_SERVICE_PORT:-4004}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-26214400}
      ALLOWED_MIME_TYPES: ${ALLOWED_MIME_TYPES:-}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-chatapp-media}
      OTEL_SERVICE_NAME: multimedia-service
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318/v1/traces}
      OTEL_METRICS_PORT: 9464
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

volumes:
  minio-data:
